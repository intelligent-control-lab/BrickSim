[workspace]
channels = ["conda-forge"]
name = "bricksim-native"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
# Use the glibc 2.39 Conda sysroot for Isaac Sim 6.0 because it doesn't have 2.35.
# ABI checks guard our runtime surface.
libc = { family = "glibc", version = "2.39" }

[tasks]
build-native = "scripts/build.sh release"
build-native-release = "scripts/build.sh release"
build-native-debug = "scripts/build.sh debug"
test-native-debug = "scripts/build.sh debug-tests"
test-native-release = "scripts/build.sh release-tests"

[dependencies]
python = "==3.12.13"
cmake = "==4.3.1"
ninja = "==1.13.2"
clangxx = "==22.1.3"
clang-tools = "==22.1.3"
llvm-tools = "==22.1.3"
lld = "==22.1.3"
libstdcxx-devel_linux-64 = "==15.2.0"
libgcc-devel_linux-64 = "==15.2.0"
"7zip" = "==26.00"
patch = "==2.8"
wget = "==1.25.0"
unzip = "==6.0"
