name: Lint

on:
  push:
    paths:
      - "python/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "python/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  BRICKSIM_SKIP_NATIVE_BUILD: "1"

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ruff

      - name: Run Ruff
        continue-on-error: true
        run: uv run --group dev ruff check
